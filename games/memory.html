<!DOCTYPE html>
<html lang="zh-Hant" data-role="basic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>機型對決｜正久泵浦道場</title>
<script>document.documentElement.dataset.role = localStorage.getItem('jj_role') || 'basic';</script>
<link rel="stylesheet" href="../css/style.css">
<style>
  .mem-front .psvg { width: 70%; height: 70%; min-height: 0; }
  .mem-front .psvg svg { width: 100%; height: 100%; }
</style>
</head>
<body class="game-bg">
<div class="topbar">
  <a class="brand" href="../home.html">← 大廳</a>
  <div class="role-switch">
    <button class="reset-btn" id="btnReset">⟲ 重置</button>
    <button class="role-pill" id="pillBasic">🌱 新手版</button>
    <button class="role-pill" id="pillPro">🔥 專業版</button>
  </div>
</div>

<!-- 開始畫面 -->
<div class="wrap" id="startView">
  <div class="card" style="text-align:center">
    <div class="hazard"></div>
    <h2>🃏 機型對決</h2>
    <p class="quote-bar" id="startDesc"></p>
    <p class="muted">卡池混編<b>正久經手的真機照</b>與<b>關鍵零組件</b>，每局隨機抽 6 對。步數越少，江湖地位越高。</p>
    <p class="muted" id="profLine" style="margin-top:4px"></p>
    <p class="muted" id="bestLine" style="margin-top:6px"></p>
    <button class="btn block" id="btnStart" style="margin-top:16px">開 翻 ！</button>
  </div>
</div>

<!-- 遊戲畫面：滿版免捲動 -->
<div class="mem-stage" id="gameView" style="display:none">
  <div class="mem-stats hud-bar" style="margin:0">
    <div class="hud-box"><div class="lab">步數</div><div class="val" id="statMoves">0</div></div>
    <div class="hud-box timer"><div class="lab">秒數</div><div class="val" id="statTime">0</div></div>
    <div class="hud-box"><div class="lab">配對</div><div class="val" id="statPairs">0/6</div></div>
  </div>
  <div class="mem-grid" id="grid"></div>
</div>

<!-- 結算畫面 -->
<div class="wrap" id="endView" style="display:none">
  <div class="card" style="text-align:center">
    <div class="hazard"></div>
    <h2>對決結束</h2>
    <div class="stars" id="finalStars"></div>
    <p class="quote-bar" id="finalMsg"></p>
  </div>
  <div class="card" style="text-align:center">
    <p class="muted">給大叔打個分，手下留情。</p>
    <div class="rate-stars" id="rateStars">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
  </div>
  <a class="btn line block" id="ctaBtn">📱 看上哪台？LINE 大叔報個好價！</a>
  <button class="btn ghost block" id="btnReplay" style="margin-top:10px">不服？再翻一場</button>
</div>

<script src="../js/config.js"></script>
<script src="../js/tracker.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/game-kit.js"></script>
<script src="../data/models.js"></script>
<script>
(function () {
  if (!JJ_AUTH.guard()) return;
  let role = JJ_AUTH.role() || 'basic';
  let isPro = role === 'pro';
  JJ_UI.stampLogo('../');
  JJ_IDLE.init();

  function paintRole() {
    document.documentElement.dataset.role = role;
    document.getElementById('pillBasic').className = 'role-pill' + (!isPro ? ' on-basic' : '');
    document.getElementById('pillPro').className = 'role-pill' + (isPro ? ' on-pro' : '');
    document.getElementById('startDesc').textContent = JJ_QUOTE('memStart') +
      (isPro ? '（專業級：圖卡配名號特點）' : '（新手級：同款配對）');
    paintBest();
    document.getElementById('profLine').innerHTML = (p=>`👤 <b>${p.name}</b>｜敏捷 ${p.stats.agi}（結算折抵 ${Math.floor(p.stats.agi/3)} 步）`)(JJ_PROFILE.getOrDefault());
  }
  function paintBest() {
    const b = JJ_BEST.get('memory_'+role);
    document.getElementById('bestLine').innerHTML = b
      ? `🏆 最佳紀錄：<b>${b.moves} 步 / ${b.seconds} 秒</b>` : '尚無紀錄，開翻寫下第一筆！';
  }
  document.getElementById('pillBasic').addEventListener('click', () => { role='basic'; isPro=false; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('pillPro').addEventListener('click', () => { role='pro'; isPro=true; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('ctaBtn').href = JJ_CONFIG.CTA_URL;
  paintRole();

  let first = null, lock = false, moves = 0, pairs = 0, total = 6, timeS = 0, timerId = null, startTs = 0;

  function shuffle(a) { return a.slice().sort(() => Math.random() - .5); }

  function faceHTML(m) {
    if (m.img) return `<img src="${m.img}" alt="${m.name}"><div class="cap">${m.name}<br>${m.sub}</div>`;
    return `<div class="psvg"><svg viewBox="0 0 100 100">${m.svg}</svg></div><div class="cap">${m.name}<br>${m.sub}</div>`;
  }
  function textFace(m) {
    return `<div class="tname">${m.name}</div><div class="tdesc">${m.sub}<br>${m.desc}</div>`;
  }

  function buildCards() {
    const picked = shuffle(MEM_CARDS).slice(0, 6); // 機型+零組件混抽
    let cards = [];
    picked.forEach(m => {
      if (isPro) {
        cards.push({ key: m.key, html: faceHTML(m), text: false });
        cards.push({ key: m.key, html: textFace(m), text: true });
      } else {
        cards.push({ key: m.key, html: faceHTML(m), text: false });
        cards.push({ key: m.key, html: faceHTML(m), text: false });
      }
    });
    return shuffle(cards);
  }

  function show(id) {
    document.getElementById('startView').style.display = id === 'startView' ? 'block' : 'none';
    document.getElementById('gameView').style.display = id === 'gameView' ? 'flex' : 'none';
    document.getElementById('endView').style.display = id === 'endView' ? 'block' : 'none';
  }

  function start() {
    SFX.click();
    const cards = buildCards();
    total = cards.length / 2;
    moves = 0; pairs = 0; timeS = 0; first = null; lock = false; startTs = Date.now();
    paintStats();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cards.forEach(c => {
      const el = document.createElement('div');
      el.className = 'mem-card';
      el.dataset.key = c.key;
      el.innerHTML = `<div class="mem-inner">
        <div class="mem-face mem-back"></div>
        <div class="mem-face mem-front${c.text ? ' textcard' : ''}">${c.html}</div>
      </div>`;
      el.addEventListener('click', () => flip(el));
      grid.appendChild(el);
    });
    show('gameView');
    clearInterval(timerId);
    timerId = setInterval(() => { timeS++; paintStats(); }, 1000);
    jjTrack('game_start', 'memory', { role });
  }

  function paintStats() {
    document.getElementById('statMoves').textContent = moves;
    document.getElementById('statTime').textContent = timeS;
    document.getElementById('statPairs').textContent = pairs + '/' + total;
  }

  function flip(el) {
    if (lock || el.classList.contains('flip') || el.classList.contains('done')) return;
    SFX.flip();
    el.classList.add('flip');
    if (!first) { first = el; return; }
    moves++;
    paintStats();
    const match = first.dataset.key === el.dataset.key && first !== el;
    if (match) {
      SFX.match();
      first.classList.add('done'); el.classList.add('done');
      pairs++;
      paintStats();
      first = null;
      if (pairs === total) setTimeout(finish, 650);
    } else {
      SFX.bad();
      lock = true;
      document.body.classList.remove('shake'); void document.body.offsetWidth;
      document.body.classList.add('shake');
      const a = first;
      first = null;
      setTimeout(() => { a.classList.remove('flip'); el.classList.remove('flip'); lock = false; }, 850);
    }
  }

  function finish() {
    clearInterval(timerId);
    SFX.win();
    show('endView');
    const disc = JJ_PROFILE.agiStepDiscount();           // 敏捷：少算步數
    if (disc > 0) JJ_UI.notice(`🏃 <b>敏捷發動！</b><br>結算折抵 ${disc} 步。`);
    const counted = Math.max(total, moves - disc);
    const extra = counted - total;
    const stars = extra <= total * .5 ? 3 : extra <= total * 1.2 ? 2 : 1;
    document.getElementById('finalStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('finalMsg').textContent =
      `${moves} 步${disc ? '（敏捷折抵 ' + disc + ' 步，計 ' + counted + ' 步）' : ''}、${timeS} 秒收工 —— ` +
      JJ_QUOTE(stars === 3 ? 'win' : stars === 2 ? 'mid' : 'lose');
    const b = JJ_BEST.get('memory_'+role);
    if (!b || counted < b.moves || (counted === b.moves && timeS < b.seconds)) {
      JJ_BEST.set('memory_'+role, { moves: counted, seconds: timeS });
      JJ_UI.toast('🏆 刷新最佳紀錄！');
    }
    jjTrack('game_end', 'memory', {
      role, moves, counted, seconds: timeS, pairs: total, stars,
      duration_s: Math.round((Date.now() - startTs) / 1000)
    });
    JJ_UI.offerCharmReset('../');
  }

  document.getElementById('btnReset').addEventListener('click', () =>
    JJ_UI.confirm('確定要<b>重置翻牌最佳紀錄</b>嗎？', () => {
      JJ_BEST.clear('memory_'+role);
      paintBest();
      JJ_UI.toast('「歸零重來，也是一種功夫。」');
      jjTrack('reset', 'memory', {});
    }));

  document.querySelectorAll('#rateStars span').forEach(s =>
    s.addEventListener('click', () => {
      const v = +s.dataset.v;
      document.querySelectorAll('#rateStars span').forEach(x =>
        x.classList.toggle('on', +x.dataset.v <= v));
      jjTrack('rating', 'memory', { rating: v });
    }));

  document.getElementById('ctaBtn').addEventListener('click', () => jjTrack('cta_click', 'memory', {}));
  document.getElementById('btnStart').addEventListener('click', start);
  document.getElementById('btnReplay').addEventListener('click', start);
})();
</script>
</body>
</html>
