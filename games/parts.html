<!DOCTYPE html>
<html lang="zh-Hant" data-role="basic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拆解重組｜正久泵浦道場</title>
<script>document.documentElement.dataset.role = localStorage.getItem('jj_role') || 'basic';</script>
<link rel="stylesheet" href="../css/style.css">
<style>
  .rig-wrap { position: relative; width: 100%; background: rgba(0,0,0,.4); border: 1px solid var(--hud-border);
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px); }
  .rig-wrap svg { display: block; width: 100%; height: auto; }
  .slot-zone { fill: rgba(0,0,0,.25); stroke: var(--acc); stroke-width: 2; stroke-dasharray: 8 6; opacity: .8; }
  .slot-zone.hot { fill: rgba(0,200,255,.18); stroke-width: 4; opacity: 1; }
  .slot-zone.filled { display: none; }
  .slot-q { fill: var(--acc); font-size: 30px; font-weight: 900; opacity: .55; }
  .tray { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
  .chip {
    width: 96px; padding: 6px 4px 8px; text-align: center; cursor: grab; user-select: none; touch-action: none;
    background: var(--hud); border: 1px solid var(--hud-border);
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    transition: transform .15s, box-shadow .2s;
  }
  .chip:hover { box-shadow: 0 0 14px var(--acc-glow); transform: translateY(-3px); }
  .chip svg { width: 56px; height: 56px; }
  .chip .nm { font-size: .68rem; font-weight: 900; color: var(--acc2); line-height: 1.3; }
  .chip.wrong { animation: shake .35s; border-color: var(--danger); }
  .drag-ghost {
    position: fixed; z-index: 99; pointer-events: none; width: 84px; height: 84px;
    filter: drop-shadow(0 0 14px var(--acc-glow)); transform: translate(-50%, -50%) scale(1.15);
  }
  .placed-part { animation: hitFlash .4s; }
  #noteBar { min-height: 44px; }
</style>
</head>
<body class="game-bg">
<div class="topbar">
  <a class="brand" href="../home.html">← 大廳</a>
  <div class="role-switch">
    <button class="reset-btn" id="btnReset">⟲ 重置</button>
    <button class="role-pill" id="pillBasic">🏠 持家高手</button>
    <button class="role-pill" id="pillPro">🔧 江湖師傅</button>
  </div>
</div>

<div class="wrap">
  <!-- 開始畫面 -->
  <div id="startView" class="card" style="text-align:center">
    <div class="hazard"></div>
    <h2>🧩 拆解重組</h2>
    <p class="quote-bar" id="startDesc"></p>
    <p class="muted">大叔把一台加壓機拆了個精光。零件拖回正確位置，裝錯一次記一筆。</p>
    <p class="muted" id="bestLine" style="margin-top:6px"></p>
    <button class="btn block" id="btnStart" style="margin-top:16px">開 裝 ！</button>
  </div>

  <!-- 遊戲畫面 -->
  <div id="gameView" style="display:none">
    <div class="hud-bar">
      <div class="hud-box"><div class="lab">已歸位</div><div class="val" id="statDone">0/5</div></div>
      <div class="hud-box timer"><div class="lab">秒數</div><div class="val" id="statTime">0</div></div>
      <div class="hud-box"><div class="lab">失誤</div><div class="val" id="statMiss">0</div></div>
    </div>
    <div class="rig-wrap" id="rig"></div>
    <p class="quote-bar" id="noteBar">「拖零件到虛線框。手要穩，心要定。」</p>
    <div class="tray" id="tray"></div>
  </div>

  <!-- 結算畫面 -->
  <div id="endView" style="display:none">
    <div class="card" style="text-align:center">
      <div class="hazard"></div>
      <h2>組裝完工</h2>
      <div class="stars" id="finalStars"></div>
      <p class="quote-bar" id="finalMsg"></p>
    </div>
    <div class="card" style="text-align:center">
      <p class="muted">給大叔打個分，手下留情。</p>
      <div class="rate-stars" id="rateStars">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <a class="btn line block" id="ctaBtn">📱 想看實機拆解？LINE 大叔開課！</a>
    <button class="btn ghost block" id="btnReplay" style="margin-top:10px">不服？再拆一台</button>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/tracker.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/game-kit.js"></script>
<script src="../data/parts.js"></script>
<script>
(function () {
  if (!JJ_AUTH.guard()) return;
  let role = JJ_AUTH.role() || 'basic';
  let isPro = role === 'pro';
  const VB = { w: 800, h: 520 };

  JJ_UI.stampLogo('../');
  function paintRole() {
    document.documentElement.dataset.role = role;
    document.getElementById('pillBasic').className = 'role-pill' + (!isPro ? ' on-basic' : '');
    document.getElementById('pillPro').className = 'role-pill' + (isPro ? ' on-pro' : '');
    document.getElementById('startDesc').textContent =
      JJ_QUOTE('partsStart') + '（' + (isPro ? '師傅級七大件' : '持家級五大件') + '）';
    paintBest();
  }
  function paintBest() {
    const b = JJ_BEST.get('parts');
    document.getElementById('bestLine').innerHTML = b
      ? `🏆 最佳紀錄：<b>${b.seconds} 秒 / 失誤 ${b.miss}</b>` : '尚無紀錄，開裝寫下第一筆！';
  }
  document.getElementById('pillBasic').addEventListener('click', () => { role='basic'; isPro=false; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('pillPro').addEventListener('click', () => { role='pro'; isPro=true; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('ctaBtn').href = JJ_CONFIG.CTA_URL;
  paintRole();

  let parts = [], done = 0, miss = 0, timeS = 0, timerId = null, startTs = 0, patShield = false;

  const GOOD = ['「喀！就是這個位置。」', '「內行！這手穩得很。」', '「裝得漂亮，出師有望！」'];
  const BAD = ['「欸欸欸，裝錯地方啦！」', '「這樣裝下去會漏水啦！」', '「再看一眼圖，別硬塞！」'];
  const pick = a => a[Math.floor(Math.random() * a.length)];

  function machineSVG() {
    // 機台底圖：管路、外殼輪廓 + 零件插槽
    let slots = '', qmarks = '';
    parts.forEach(p => {
      const z = p.zone;
      slots += `<rect id="zone-${p.id}" class="slot-zone" x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" rx="10"/>`;
      qmarks += `<text id="q-${p.id}" class="slot-q" x="${z.x + z.w/2}" y="${z.y + z.h/2 + 10}" text-anchor="middle">?</text>`;
    });
    return `<svg viewBox="0 0 ${VB.w} ${VB.h}" xmlns="http://www.w3.org/2000/svg">
      <!-- 底座 -->
      <rect x="50" y="440" width="620" height="26" rx="6" fill="#22303c" stroke="#45596b"/>
      <rect x="120" y="410" width="30" height="34" fill="#2a3844"/>
      <rect x="520" y="410" width="30" height="34" fill="#2a3844"/>
      <!-- 泵室外殼 -->
      <circle cx="170" cy="330" r="98" fill="#1a2733" stroke="#5a7183" stroke-width="5"/>
      <!-- 出水管 -->
      <path d="M170 232 L170 95 L740 95" fill="none" stroke="#5a7183" stroke-width="18" stroke-linejoin="round"/>
      <path d="M740 80 L740 110" stroke="#5a7183" stroke-width="8"/>
      <!-- 進水管 -->
      <path d="M72 330 L20 330" stroke="#5a7183" stroke-width="18"/>
      <!-- 軸 -->
      <rect x="255" y="318" width="90" height="18" fill="#42525f"/>
      <!-- 馬達外殼輪廓 -->
      <rect x="322" y="238" width="292" height="182" rx="16" fill="#141e27" stroke="#5a7183" stroke-width="5"/>
      <rect x="614" y="290" width="26" height="70" rx="8" fill="#22303c" stroke="#45596b"/>
      <!-- 標題 -->
      <text x="400" y="505" fill="#6d8496" font-size="16" text-anchor="middle" letter-spacing="4">家用加壓機 解剖圖｜正久道場</text>
      ${slots}${qmarks}
      <g id="placedLayer"></g>
    </svg>`;
  }

  function show(id) {
    ['startView', 'gameView', 'endView'].forEach(v =>
      document.getElementById(v).style.display = v === id ? 'block' : 'none');
  }

  function start() {
    SFX.click();
    parts = PARTS.filter(p => isPro || p.level === 'basic');
    done = 0; miss = 0; timeS = 0; startTs = Date.now();
    patShield = JJ_PROFILE.rollRegret(); // 耐心：一次失誤不記帳
    if (patShield) JJ_UI.toast('🧪 耐心發動！第一次裝錯<b>不記失誤</b>。');
    document.getElementById('rig').innerHTML = machineSVG();
    const tray = document.getElementById('tray');
    tray.innerHTML = '';
    shuffle(parts).forEach(p => {
      const c = document.createElement('div');
      c.className = 'chip';
      c.id = 'chip-' + p.id;
      c.innerHTML = `<svg viewBox="0 0 100 100">${p.svg}</svg><div class="nm">${p.name}</div>`;
      bindDrag(c, p);
      tray.appendChild(c);
    });
    paintStats();
    document.getElementById('noteBar').textContent = '「拖零件到虛線框。手要穩，心要定。」';
    show('gameView');
    clearInterval(timerId);
    timerId = setInterval(() => { timeS++; paintStats(); }, 1000);
    jjTrack('game_start', 'parts', { role });
  }

  function shuffle(a) { return a.slice().sort(() => Math.random() - .5); }

  function paintStats() {
    document.getElementById('statDone').textContent = done + '/' + parts.length;
    document.getElementById('statTime').textContent = timeS;
    document.getElementById('statMiss').textContent = miss;
  }

  /* 拖曳（pointer events：滑鼠+觸控通吃） */
  function bindDrag(chip, part) {
    chip.addEventListener('pointerdown', e => {
      e.preventDefault();
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.innerHTML = `<svg viewBox="0 0 100 100" width="84" height="84">${part.svg}</svg>`;
      document.body.appendChild(ghost);
      moveGhost(e);
      chip.style.opacity = '.35';

      function moveGhost(ev) {
        ghost.style.left = ev.clientX + 'px';
        ghost.style.top = ev.clientY + 'px';
        hoverZone(ev);
      }
      function hoverZone(ev) {
        const z = zoneAt(ev.clientX, ev.clientY);
        parts.forEach(p => {
          const el = document.getElementById('zone-' + p.id);
          if (el && !el.classList.contains('filled')) el.classList.toggle('hot', z === p.id);
        });
      }
      function up(ev) {
        document.removeEventListener('pointermove', moveGhost);
        document.removeEventListener('pointerup', up);
        ghost.remove();
        chip.style.opacity = '1';
        parts.forEach(p => { const el = document.getElementById('zone-' + p.id); el && el.classList.remove('hot'); });
        const hit = zoneAt(ev.clientX, ev.clientY);
        if (!hit) return; // 沒放到任何框：安靜收回
        if (hit === part.id) place(part, chip);
        else wrong(chip);
      }
      document.addEventListener('pointermove', moveGhost);
      document.addEventListener('pointerup', up);
    });
  }

  /* 螢幕座標 → viewBox 座標 → 命中的插槽 id */
  function zoneAt(cx, cy) {
    const svg = document.querySelector('#rig svg');
    const r = svg.getBoundingClientRect();
    const x = (cx - r.left) / r.width * VB.w;
    const y = (cy - r.top) / r.height * VB.h;
    const pad = 14;
    for (const p of parts) {
      if (document.getElementById('zone-' + p.id).classList.contains('filled')) continue;
      const z = p.zone;
      if (x >= z.x - pad && x <= z.x + z.w + pad && y >= z.y - pad && y <= z.y + z.h + pad) return p.id;
    }
    return null;
  }

  function place(part, chip) {
    const z = part.zone;
    const layer = document.getElementById('placedLayer');
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'placed-part');
    // 把 100x100 的零件圖縮放進插槽
    const s = Math.min(z.w, z.h) / 100;
    const tx = z.x + (z.w - 100 * s) / 2, ty = z.y + (z.h - 100 * s) / 2;
    g.setAttribute('transform', `translate(${tx},${ty}) scale(${s})`);
    g.innerHTML = part.svg;
    layer.appendChild(g);
    document.getElementById('zone-' + part.id).classList.add('filled');
    const q = document.getElementById('q-' + part.id); q && q.remove();
    chip.remove();
    SFX.match();
    done++;
    paintStats();
    document.getElementById('noteBar').innerHTML = `${pick(GOOD)}<br><b>${part.name}</b>：${part.note}`;
    if (done === parts.length) setTimeout(finish, 900);
  }

  function wrong(chip) {
    if (patShield) {
      patShield = false;
      SFX.heal();
      document.getElementById('noteBar').innerHTML = '🧪 <b>耐心護體！</b>這次失誤大叔當沒看見。';
      return;
    }
    SFX.bad();
    miss++;
    paintStats();
    chip.classList.remove('wrong'); void chip.offsetWidth; chip.classList.add('wrong');
    document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
    document.getElementById('noteBar').textContent = pick(BAD);
  }

  function finish() {
    clearInterval(timerId);
    show('endView');
    const stars = miss === 0 ? 3 : miss <= 2 ? 2 : 1;
    stars === 1 ? SFX.lose() : SFX.win();
    document.getElementById('finalStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('finalMsg').textContent =
      `${timeS} 秒、失誤 ${miss} 次 —— ` + JJ_QUOTE(stars === 3 ? 'win' : stars === 2 ? 'mid' : 'lose');
    const b = JJ_BEST.get('parts');
    if (!b || miss < b.miss || (miss === b.miss && timeS < b.seconds)) {
      JJ_BEST.set('parts', { seconds: timeS, miss });
      JJ_UI.toast('🏆 刷新最佳紀錄！');
    }
    jjTrack('game_end', 'parts', { role, seconds: timeS, miss, parts: parts.length, stars,
      duration_s: Math.round((Date.now() - startTs) / 1000) });
    JJ_UI.offerCharmReset('../');
  }

  document.getElementById('btnReset').addEventListener('click', () =>
    JJ_UI.confirm('確定要<b>重置拆解重組最佳紀錄</b>嗎？', () => {
      JJ_BEST.clear('parts');
      paintBest();
      JJ_UI.toast('「歸零重來，也是一種功夫。」');
      jjTrack('reset', 'parts', {});
    }));

  document.querySelectorAll('#rateStars span').forEach(s =>
    s.addEventListener('click', () => {
      const v = +s.dataset.v;
      document.querySelectorAll('#rateStars span').forEach(x =>
        x.classList.toggle('on', +x.dataset.v <= v));
      jjTrack('rating', 'parts', { rating: v });
    }));
  document.getElementById('ctaBtn').addEventListener('click', () => jjTrack('cta_click', 'parts', {}));
  document.getElementById('btnStart').addEventListener('click', start);
  document.getElementById('btnReplay').addEventListener('click', start);
})();
</script>
</body>
</html>
