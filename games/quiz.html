<!DOCTYPE html>
<html lang="zh-Hant" data-role="basic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>快問快答｜正久泵浦道場</title>
<script>document.documentElement.dataset.role = localStorage.getItem('jj_role') || 'basic';</script>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="game-bg">
<div class="topbar">
  <a class="brand" href="../home.html">← 大廳</a>
  <div class="role-switch">
    <button class="reset-btn" id="btnReset">⟲ 重置</button>
    <button class="role-pill" id="pillBasic">🌱 新手版</button>
    <button class="role-pill" id="pillPro">🔥 專業版</button>
  </div>
</div>

<div class="wrap">
  <!-- 開始畫面 -->
  <div id="startView" class="card" style="text-align:center">
    <div class="hazard"></div>
    <h2>⚡ 快問快答</h2>
    <p class="quote-bar" id="startDesc"></p>
    <p class="muted">答得快分數高、連對觸發連斬爆擊。手軟的，現在退出還來得及。</p>
    <p class="muted" id="profLine" style="margin-top:4px"></p>
    <p class="muted" id="bestLine" style="margin-top:6px"></p>
    <button class="btn block" id="btnStart" style="margin-top:16px">開 戰 ！</button>
  </div>

  <!-- 遊戲畫面 -->
  <div id="gameView" style="display:none">
    <div class="hud-bar">
      <div class="hud-box"><div class="lab">得分</div><div class="val" id="hudScore">0</div></div>
      <div class="hud-box timer"><div class="lab">倒數</div><div class="val" id="hudTimer">--</div></div>
      <div class="hud-box"><div class="lab">連斬</div><div class="val" id="hudCombo">0</div></div>
    </div>
    <div class="q-progress"><div id="progBar"></div></div>
    <div class="card" id="qCard">
      <span class="q-cat" id="qCat"></span>
      <div class="q-question" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <p class="quote-bar" id="feedback" style="display:none"></p>
  </div>

  <!-- 結算畫面 -->
  <div id="endView" style="display:none">
    <div class="card" style="text-align:center">
      <div class="hazard"></div>
      <h2>戰報出爐</h2>
      <div class="score-big" id="finalScore"></div>
      <div class="stars" id="finalStars"></div>
      <p class="quote-bar" id="finalMsg"></p>
    </div>
    <div class="card" id="reviewCard" style="display:none">
      <h2>📖 大叔翻你的錯題本</h2>
      <p class="muted">「錯不可恥，不抄筆記才可恥。」</p>
      <div id="reviewList" style="margin-top:10px"></div>
    </div>
    <div class="card" style="text-align:center">
      <p class="muted">給大叔打個分，手下留情。</p>
      <div class="rate-stars" id="rateStars">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <a class="btn line block" id="ctaBtn">📱 設備出代誌？LINE 大叔，卡實在！</a>
    <button class="btn ghost block" id="btnReplay" style="margin-top:10px">不服？再戰一場</button>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/tracker.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/game-kit.js"></script>
<script src="../data/quiz_basic.js"></script>
<script src="../data/quiz_pro.js"></script>
<script>
(function () {
  if (!JJ_AUTH.guard()) return;
  let role = JJ_AUTH.role() || 'basic';
  let isPro = role === 'pro';
  const N_QUESTIONS = 10;
  const CAT_NAME = { basic: '基礎原理', safety: '使用安全', select: '選購眉角', fix: '故障判斷', jj: '認識正久' };

  const QUOTES = {
    good: ['「漂亮！這題閉著眼都會。」', '「內行的喔，大叔給你按讚！」', '「穩！就是這個手感。」', '「這速度，去比賽都嫌快。」'],
    bad: ['「哎唷，燒毀啦！筆記抄起來。」', '「這題錯，回去罰站十分鐘。」', '「別急著出手，先想再按！」'],
    timeout: ['「時間就是水壓，一去不回頭！」', '「發什麼呆？機器都涼了！」'],
    end3: '「後生可畏，大叔服你。這杯茶敬你！」',
    end2: '「有兩下子，但江湖水深，再練！」',
    end1: '「輸不可恥，不學才可恥。錯題本看完再來。」'
  };
  const pick = a => a[Math.floor(Math.random() * a.length)];

  JJ_UI.stampLogo('../');
  JJ_IDLE.init();
  function paintRole() {
    document.documentElement.dataset.role = role;
    document.getElementById('pillBasic').className = 'role-pill' + (!isPro ? ' on-basic' : '');
    document.getElementById('pillPro').className = 'role-pill' + (isPro ? ' on-pro' : '');
    document.getElementById('startDesc').textContent =
      JJ_QUOTE('quizStart') + '（' + (isPro ? '專業級' : '新手級') + '：每題 ' + timeLimit() + ' 秒）';
    paintBest();
    document.getElementById('profLine').innerHTML = (p=>`👤 <b>${p.name}</b>｜耐心 ${p.stats.pat}（後悔藥機率 ${p.stats.pat*8}%）・智力 ${p.stats.int}（提示機率 ${p.stats.int*9}%）`)(JJ_PROFILE.getOrDefault());
  }
  function paintBest() {
    const b = JJ_BEST.get('quiz_'+role);
    document.getElementById('bestLine').innerHTML = b
      ? `🏆 最佳紀錄：<b>${b} 分</b>` : '尚無紀錄，開戰寫下第一筆！';
  }
  function timeLimit() { return isPro ? 15 : 20; }
  function bank() { return isPro ? QUIZ_PRO : QUIZ_BASIC; }

  document.getElementById('pillBasic').addEventListener('click', () => { role = 'basic'; isPro = false; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('pillPro').addEventListener('click', () => { role = 'pro'; isPro = true; JJ_AUTH.setRole(role); paintRole(); });
  document.getElementById('ctaBtn').href = JJ_CONFIG.CTA_URL;
  paintRole();

  let qs = [], idx = 0, score = 0, combo = 0, maxCombo = 0, timeLeft = 0, timerId = null, wrongs = [], startTs = 0;
  let hintIdx = -1, regretAvail = false, nextTimer = null; // 智力提示 / 耐心後悔藥

  function shuffle(a) { return a.slice().sort(() => Math.random() - .5); }
  function pickQuestions() {
    const jj = shuffle(bank().filter(q => q.category === 'jj')).slice(0, 2);
    const rest = shuffle(bank().filter(q => q.category !== 'jj')).slice(0, N_QUESTIONS - jj.length);
    return shuffle(jj.concat(rest));
  }

  function show(id) {
    ['startView', 'gameView', 'endView'].forEach(v =>
      document.getElementById(v).style.display = v === id ? 'block' : 'none');
  }

  function start() {
    SFX.click();
    qs = pickQuestions(); idx = 0; score = 0; combo = 0; maxCombo = 0; wrongs = []; startTs = Date.now();
    hintIdx = JJ_PROFILE.rollHint(N_QUESTIONS);          // 智力：隨機一題提示
    regretAvail = JJ_PROFILE.rollRegret();               // 耐心：本局後悔藥
    if (regretAvail) JJ_UI.notice('🧪 <b>耐心發動！</b><br>你帶著一顆「後悔藥」上場，答錯可重來一次。');
    paintHud();
    show('gameView');
    jjTrack('game_start', 'quiz', { role, hint: hintIdx >= 0, regret: regretAvail });
    nextQ();
  }

  function paintHud(bumpScore) {
    const s = document.getElementById('hudScore');
    s.textContent = score;
    if (bumpScore) { s.classList.remove('bump'); void s.offsetWidth; s.classList.add('bump'); }
    document.getElementById('hudCombo').textContent = combo;
  }

  function nextQ() {
    document.getElementById('feedback').style.display = 'none';
    if (idx >= qs.length) return finish();
    const q = qs[idx];
    document.getElementById('progBar').style.width = (idx / qs.length * 100) + '%';
    document.getElementById('qCat').textContent = CAT_NAME[q.category] || q.category;
    document.getElementById('qText').textContent = `Q${idx + 1}. ${q.question}`;
    const box = document.getElementById('qOpts');
    box.innerHTML = '';
    q.options.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'q-opt';
      b.textContent = opt;
      b.addEventListener('click', () => answer(i, b));
      box.appendChild(b);
    });
    timeLeft = timeLimit();
    paintTimer();
    const startTimer = () =>
      timerId = setInterval(() => { timeLeft--; paintTimer(); if (timeLeft <= 0) answer(-1, null); }, 1000);
    if (idx === hintIdx) { // 智力提示：正解發光（確認後才開始計時）
      box.children[q.answer].classList.add('hint-glow');
      JJ_UI.notice('🧠 <b>智力發動！</b><br>大叔偷偷幫你點了燈——發光的就是正解。', { onOk: startTimer });
    } else startTimer();
  }

  function paintTimer() {
    const t = document.getElementById('hudTimer');
    t.textContent = timeLeft + 's';
    t.classList.toggle('hurry', timeLeft <= 5);
  }

  function feedbackMsg(text) {
    const f = document.getElementById('feedback');
    f.textContent = text;
    f.style.display = 'block';
  }

  function answer(i, btn) {
    clearInterval(timerId);
    const q = qs[idx];
    const opts = document.querySelectorAll('.q-opt');
    opts.forEach(o => o.setAttribute('disabled', ''));
    opts[q.answer] && opts[q.answer].classList.add('correct');
    const correct = i === q.answer;
    if (correct) {
      SFX.good();
      combo++;
      maxCombo = Math.max(maxCombo, combo);
      const gained = 10 + timeLeft + (combo >= 2 ? combo * 3 : 0);
      score += gained;
      paintHud(true);
      floatScore('+' + gained, btn);
      feedbackMsg(pick(QUOTES.good));
      if (combo >= 2) { SFX.combo(); comboBlast(combo); }
    } else {
      SFX.bad();
      combo = 0;
      paintHud();
      if (btn) btn.classList.add('wrong');
      document.body.classList.remove('shake'); void document.body.offsetWidth;
      document.body.classList.add('shake');
      wrongs.push(q);
      if (regretAvail) { // 耐心：後悔藥重答
        feedbackMsg((i === -1 ? pick(QUOTES.timeout) : pick(QUOTES.bad)) + ' ');
        const f = document.getElementById('feedback');
        const rb = document.createElement('button');
        rb.className = 'btn orange';
        rb.style.cssText = 'padding:6px 14px;font-size:.8rem;margin-left:8px';
        rb.textContent = '🧪 吃後悔藥重答';
        rb.addEventListener('click', () => {
          SFX.heal();
          regretAvail = false;
          clearTimeout(nextTimer);
          wrongs.pop();
          nextQ(); // idx 未推進前先攔截 → 直接重出同一題
          jjTrack('regret_used', 'quiz', {});
        });
        f.appendChild(rb);
        nextTimer = setTimeout(() => { idx++; nextQ(); }, 3400);
        return;
      }
      feedbackMsg(i === -1 ? pick(QUOTES.timeout) : pick(QUOTES.bad));
    }
    idx++;
    nextTimer = setTimeout(nextQ, correct ? 1000 : 1700);
  }

  /* 得分飄字：從按下的選項飄出 */
  function floatScore(text, btn) {
    const el = document.createElement('div');
    el.className = 'float-score';
    el.textContent = text;
    const r = btn ? btn.getBoundingClientRect() : { left: innerWidth / 2, top: innerHeight / 2, width: 0 };
    el.style.left = (r.left + r.width / 2 - 20) + 'px';
    el.style.top = (r.top - 10) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  /* COMBO 全螢幕爆擊：巨字 + 衝擊環 + 火花四射 + 震動 */
  function comboBlast(n) {
    const blast = document.createElement('div');
    blast.className = 'combo-blast';
    let sparks = '';
    const emo = ['🔥', '⚡', '💥', '✨'];
    for (let k = 0; k < 10; k++) {
      const ang = Math.PI * 2 * k / 10;
      const dist = 30 + Math.random() * 25;
      sparks += `<span class="spark" style="--dx:${Math.cos(ang) * dist}vmin; --dy:${Math.sin(ang) * dist}vmin">${emo[k % 4]}</span>`;
    }
    blast.innerHTML = `<div class="ring"></div>${sparks}
      <div class="txt">${n} 連斬!!</div>
      <div class="sub">${n >= 5 ? '「無情，太無情了！」' : n >= 3 ? '「殺紅眼了喔！」' : '「來勁了喔！」'}</div>`;
    document.body.appendChild(blast);
    document.body.classList.remove('shake'); void document.body.offsetWidth;
    document.body.classList.add('shake');
    setTimeout(() => blast.remove(), 900);
  }

  function finish() {
    show('endView');
    document.getElementById('progBar').style.width = '100%';
    const nCorrect = qs.length - wrongs.length;
    const stars = nCorrect >= 9 ? 3 : nCorrect >= 6 ? 2 : 1;
    stars === 1 ? SFX.lose() : SFX.win();
    document.getElementById('finalScore').textContent = score + ' 分';
    document.getElementById('finalStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('finalMsg').textContent =
      `答對 ${nCorrect}/${qs.length}．最高 ${maxCombo} 連斬 —— ` +
      JJ_QUOTE(stars === 3 ? 'win' : stars === 2 ? 'mid' : 'lose');
    if (!JJ_BEST.get('quiz_'+role) || score > JJ_BEST.get('quiz_'+role)) {
      JJ_BEST.set('quiz_'+role, score);
      JJ_UI.toast('🏆 刷新最佳紀錄！');
    }
    JJ_UI.offerCharmReset('../');
    if (wrongs.length) {
      document.getElementById('reviewCard').style.display = 'block';
      document.getElementById('reviewList').innerHTML = wrongs.map(q =>
        `<div class="review-item"><b>${q.question}</b><br>
         <span class="ok">正解：${q.options[q.answer]}</span><br>${q.explain}</div>`).join('');
    } else {
      document.getElementById('reviewCard').style.display = 'none';
    }
    jjTrack('game_end', 'quiz', {
      role, score, correct: nCorrect, total: qs.length, stars, max_combo: maxCombo,
      duration_s: Math.round((Date.now() - startTs) / 1000)
    });
  }

  document.querySelectorAll('#rateStars span').forEach(s =>
    s.addEventListener('click', () => {
      const v = +s.dataset.v;
      document.querySelectorAll('#rateStars span').forEach(x =>
        x.classList.toggle('on', +x.dataset.v <= v));
      jjTrack('rating', 'quiz', { rating: v });
    }));

  document.getElementById('btnReset').addEventListener('click', () =>
    JJ_UI.confirm('確定要<b>重置快問快答最佳紀錄</b>嗎？', () => {
      JJ_BEST.clear('quiz_'+role);
      paintBest();
      JJ_UI.toast('「歸零重來，也是一種功夫。」');
      jjTrack('reset', 'quiz', {});
    }));
  document.getElementById('ctaBtn').addEventListener('click', () => jjTrack('cta_click', 'quiz', {}));
  document.getElementById('btnStart').addEventListener('click', start);
  document.getElementById('btnReplay').addEventListener('click', start);
})();
</script>
</body>
</html>
