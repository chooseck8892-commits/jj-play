<!DOCTYPE html>
<html lang="zh-Hant" data-role="basic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>選你的戰場｜正久泵浦道場</title>
<script>document.documentElement.dataset.role = localStorage.getItem('jj_role') || 'basic';</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="home.html">正久<span>．</span>泵浦道場</a>
  <div class="role-switch">
    <button class="role-pill" id="pillProfile">👤</button>
    <button class="role-pill" id="pillBasic">🌱 新手版</button>
    <button class="role-pill" id="pillPro">🔥 專業版</button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="hazard"></div>
    <h2>⚔️ 選你的戰場</h2>
    <p class="quote-bar" id="lobbyQuote"></p>
    <div class="game-grid">
      <a class="game-tile" href="games/quiz.html">
        <div class="icon">⚡</div>
        <div class="name">快問快答</div>
        <div class="desc">十題定生死，手慢無分</div>
      </a>
      <a class="game-tile" href="games/memory.html">
        <div class="icon">🃏</div>
        <div class="name">機型對決</div>
        <div class="desc">看過就不忘，才叫功夫</div>
      </a>
      <a class="game-tile" href="games/parts.html">
        <div class="icon">🧩</div>
        <div class="name">拆解重組</div>
        <div class="desc">零件歸位，一次到位</div>
      </a>
      <a class="game-tile" href="games/adventure.html">
        <div class="icon">🗺️</div>
        <div class="name">故障討伐</div>
        <div class="desc">收服暴走設備怪！</div>
      </a>
    </div>
  </div>

  <div class="card">
    <div class="hazard"></div>
    <h2>🏭 正久是何方神聖？</h2>
    <p class="muted">
      <b>正久電機廠</b>，<b>1972 年</b>開廠，比你家那台老馬達還資深。
      泵浦、馬達、風機，賣的修的裝的，一條龍全包；<b>ISO 9001:2015</b> 認證掛在牆上，
      不是掛好看的。台中東區起家，中部走跳五十年——
      <b>「機器會老，功夫不會。」</b>
    </p>
    <a class="btn line block" id="ctaLine" style="margin-top:12px">📱 設備出代誌？LINE 大叔，卡實在！</a>
  </div>

  <footer>正久電機廠有限公司｜台中市東區東門路 81 號</footer>
</div>

<script src="js/config.js"></script>
<script src="js/tracker.js"></script>
<script src="js/auth.js"></script>
<script src="js/game-kit.js"></script>
<script>
(function () {
  if (!JJ_AUTH.guard()) return;
  if (!JJ_AUTH.role()) { location.href = 'index.html'; return; }
  JJ_UI.stampLogo('');

  const prof = JJ_PROFILE.getOrDefault();
  const pb = document.getElementById('pillProfile');
  pb.textContent = '👤 ' + prof.name;
  pb.addEventListener('click', () => { SFX.click(); location.href = 'index.html#profile'; });

  function paint() {
    const r = JJ_AUTH.role();
    document.documentElement.dataset.role = r;
    document.getElementById('pillBasic').className = 'role-pill' + (r === 'basic' ? ' on-basic' : '');
    document.getElementById('pillPro').className = 'role-pill' + (r === 'pro' ? ' on-pro' : '');
    document.getElementById('lobbyQuote').textContent = JJ_QUOTE(r === 'pro' ? 'lobbyPro' : 'lobby');
  }
  paint();
  document.getElementById('pillBasic').addEventListener('click', () => { JJ_AUTH.setRole('basic'); paint(); });
  document.getElementById('pillPro').addEventListener('click', () => { JJ_AUTH.setRole('pro'); paint(); });

  const cta = document.getElementById('ctaLine');
  cta.href = JJ_CONFIG.CTA_URL;
  cta.addEventListener('click', () => jjTrack('cta_click', '', { from: 'home' }));
})();
</script>
</body>
</html>
