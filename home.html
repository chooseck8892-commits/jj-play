<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>遊戲大廳｜正久電機 互動學習樂園</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="home.html">正久電機<span>．</span>樂園</a>
  <button class="role-badge" id="roleBadge"></button>
</div>

<div class="wrap">
  <div class="card">
    <h2>🎮 選擇遊戲</h2>
    <div class="game-grid">
      <a class="game-tile" href="games/quiz.html">
        <div class="icon">⚡</div>
        <div class="name">知識快問快答</div>
        <div class="desc">限時搶答．連對加成</div>
      </a>
      <a class="game-tile" href="games/memory.html">
        <div class="icon">🃏</div>
        <div class="name">機型記憶翻牌</div>
        <div class="desc">配對正久經銷機型</div>
      </a>
      <a class="game-tile soon" href="#">
        <div class="icon">🧩</div>
        <div class="name">零組件拼貼</div>
        <div class="desc">拖拉零件到正確位置</div>
      </a>
      <a class="game-tile soon" href="#">
        <div class="icon">🗺️</div>
        <div class="name">泵浦探索對戰</div>
        <div class="desc">收服故障設備怪！</div>
      </a>
    </div>
  </div>

  <div class="card">
    <h2>🏭 認識正久電機</h2>
    <p class="muted">
      <b>正久電機廠有限公司</b>自 <b>1972 年</b>起深耕泵浦、馬達、風機與工業設備的供應與維修服務，
      位於台中市東區，通過 <b>ISO 9001:2015</b> 品質管理系統認證。<br><br>
      從家用加壓馬達到工廠廠務設備，正久提供銷售、安裝、拆檢、維修、試運轉的一站式服務，
      是您身邊值得信賴的機電專家。
    </p>
    <a class="btn line block" id="ctaLine" style="margin-top:12px">📱 有設備問題？LINE 諮詢正久</a>
  </div>

  <footer>正久電機廠有限公司｜台中市東區東門路 81 號</footer>
</div>

<script src="js/config.js"></script>
<script src="js/tracker.js"></script>
<script src="js/auth.js"></script>
<script>
(function () {
  if (!JJ_AUTH.guard()) return;
  if (!JJ_AUTH.role()) { location.href = 'index.html'; return; }
  const badge = document.getElementById('roleBadge');
  function paint() {
    badge.textContent = JJ_AUTH.role() === 'pro' ? '🔧 技師版' : '🏠 家庭版';
  }
  paint();
  badge.addEventListener('click', () => {
    JJ_AUTH.setRole(JJ_AUTH.role() === 'pro' ? 'basic' : 'pro');
    paint();
  });
  const cta = document.getElementById('ctaLine');
  cta.href = JJ_CONFIG.CTA_URL;
  cta.addEventListener('click', () => jjTrack('cta_click', '', { from: 'home' }));
})();
</script>
</body>
</html>
