<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>正久電機 互動學習樂園</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="gate-hero">
    <div class="logo">正久電機<span>．</span>互動學習樂園</div>
    <p>玩遊戲，學泵浦！從家用馬達到專業檢修，寓教於樂認識正久。</p>
  </div>

  <!-- 未驗證：三通路引導 -->
  <div id="gate" class="card" style="display:none">
    <h2>加入正久，取得遊戲入場券 🎟️</h2>
    <p class="muted">請透過以下任一方式加入正久，即可獲得專屬遊戲連結：</p>
    <div class="channel-list">
      <a class="btn line block" id="btnLine">加入 LINE 官方帳號</a>
      <a class="btn fb block" id="btnFb">加入 Facebook 粉絲團</a>
      <a class="btn ig block" id="btnIg">追蹤 Instagram</a>
    </div>
    <p class="muted" style="margin-top:12px">加入後於訊息中輸入「<b>玩遊戲</b>」，即可獲得入場連結。</p>
  </div>

  <!-- 已驗證：身分選擇 -->
  <div id="rolePick" class="card" style="display:none">
    <h2>選擇你的身分</h2>
    <p class="muted">不同身分有不同難度的題目與遊戲內容，隨時可以切換。</p>
    <div class="role-pick">
      <button class="btn" id="roleBasic">🏠 家庭使用者<small>生活常識・用電安全・選購指南</small></button>
      <button class="btn orange" id="rolePro">🔧 專業水電技師<small>檢修實務・原理計算・技能檢定</small></button>
    </div>
  </div>

  <footer>
    正久電機廠有限公司｜自 1972 年深耕泵浦、馬達、風機供應與維修<br>
    本網站僅記錄匿名遊玩資料以改善體驗，不蒐集個人資料。
  </footer>
</div>

<script src="js/config.js"></script>
<script src="js/tracker.js"></script>
<script src="js/auth.js"></script>
<script>
(function () {
  const authed = JJ_AUTH.check();
  if (!authed) {
    document.getElementById('gate').style.display = 'block';
    document.getElementById('btnLine').href = JJ_CONFIG.LINE_URL;
    document.getElementById('btnFb').href = JJ_CONFIG.FB_URL;
    document.getElementById('btnIg').href = JJ_CONFIG.IG_URL;
    ['btnLine','btnFb','btnIg'].forEach(id =>
      document.getElementById(id).addEventListener('click', () =>
        jjTrack('channel_click', '', { channel: id.replace('btn','').toLowerCase() })));
    return;
  }
  document.getElementById('rolePick').style.display = 'block';
  function go(role) { JJ_AUTH.setRole(role); location.href = 'home.html'; }
  document.getElementById('roleBasic').addEventListener('click', () => go('basic'));
  document.getElementById('rolePro').addEventListener('click', () => go('pro'));
})();
</script>
</body>
</html>
